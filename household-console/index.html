<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0d12" />
    <title>Household dashboard</title>
    <link rel="stylesheet" href="/shared/theme.css" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-size: clamp(16px, 1.4vw, 18px);
        display: grid;
        place-items: center;
        padding: 2rem;
        background: transparent;
        color: var(--text, #eef2ff);
        line-height: 1.55;
      }
      main {
        max-width: 36rem;
        text-align: center;
      }
      h1 {
        font-size: clamp(1.35rem, 4vw, 1.75rem);
        font-weight: 650;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0 0 1.5rem;
        color: var(--muted, rgba(238, 242, 255, 0.78));
        font-size: 0.98rem;
      }
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
        justify-content: center;
      }
      a {
        display: inline-block;
        padding: 0.55rem 1rem;
        border-radius: 10px;
        text-decoration: none;
        color: var(--ink, #dbeafe);
        border: 1px solid var(--line, rgba(147, 197, 253, 0.4));
        background: rgba(255, 255, 255, 0.55);
        font-size: 0.95rem;
      }
      a.primary {
        background: linear-gradient(90deg, rgba(255, 90, 167, 0.24), rgba(124, 92, 255, 0.18));
        border-color: rgba(255, 90, 167, 0.55);
      }
      a:focus-visible {
        outline: 3px solid rgba(255, 90, 167, 0.75);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body class="theme">
    <main>
      <h1>Household dashboard</h1>
      <p>
        Open the TV layout on your Fire TV (Silk browser, full screen). Use the management page on a desktop browser to edit slides and sync with Supabase.
      </p>
      <div class="links">
        <a class="primary" href="/tv/">TV dashboard</a>
        <a href="/manage/">Management</a>
      </div>
    </main>
    <script src="/shared/store.js"></script>
    <script src="/shared/theme-runtime.js"></script>
  </body>
</html>
