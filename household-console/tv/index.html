<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0c0f14" />
    <title>Home console — TV</title>
    <link rel="stylesheet" href="./tv.css" />
  </head>
  <body class="tv-tenfoot">
    <div class="shell">
      <header class="tv-header">
        <div>
          <div class="tv-title" id="houseName">Home</div>
          <div class="tv-sub">Household dashboard · idle rotation</div>
        </div>
        <div class="tv-clock" id="clock"></div>
      </header>

      <section class="tv-stage" aria-roledescription="carousel" aria-label="Home slides">
        <div
          class="slide is-active"
          id="slide-calendar"
          tabindex="0"
          role="tabpanel"
          aria-label="Calendar"
        >
          <div class="slide__inner"></div>
        </div>
        <div class="slide" id="slide-chores" tabindex="0" role="tabpanel" aria-label="Chores">
          <div class="slide__inner"></div>
        </div>
        <div class="slide" id="slide-meals" tabindex="0" role="tabpanel" aria-label="Meals">
          <div class="slide__inner"></div>
        </div>
      </section>

      <footer class="tv-footer">
        <div class="dots" aria-hidden="true">
          <span class="dot is-on"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
        <div class="hint">◀ ▶ remote · opens in Silk or Web App Tester</div>
      </footer>
    </div>

    <script src="../shared/calendar.js"></script>
    <script src="../shared/store.js"></script>
    <script src="./tv.js"></script>
  </body>
</html>
