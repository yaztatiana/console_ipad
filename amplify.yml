# AWS Amplify Hosting. Logic lives in scripts/ so YAML has no bare colons in commands.
# See household-console/AMAZON-SETUP.txt
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - bash scripts/amplify-prebuild.sh
    build:
      commands:
        - bash scripts/amplify-verify.sh
  artifacts:
    baseDirectory: household-console
    files:
      - "**/*"
  cache:
    paths: []
