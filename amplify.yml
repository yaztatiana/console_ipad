# AWS Amplify Hosting — static site from household-console/
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - bash scripts/amplify-prebuild.sh
    build:
      commands:
        - bash scripts/amplify-verify.sh
  artifacts:
    baseDirectory: household-console
    files:
      - "**/*"
  cache:
    paths: []
